<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Angel Filter — Demo</title>
<style>
  :root { --bg: #0f1420; --card: #1a2032; --ink: #e8ecf5; --muted: #93a0b8; --accent: #6aa9ff; --warn: #ffb36a; --good: #7dd87a; }
  * { box-sizing: border-box; }
  body { margin: 0; font: 16px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background: var(--bg); color: var(--ink); }
  main { max-width: 820px; margin: 0 auto; padding: 40px 24px; }
  h1 { margin: 0 0 4px; font-size: 28px; letter-spacing: -0.02em; }
  .sub { color: var(--muted); margin-bottom: 28px; }
  form { display: grid; gap: 10px; margin-bottom: 24px; }
  input, textarea, button { font: inherit; color: var(--ink); background: var(--card); border: 1px solid #2a3450; border-radius: 10px; padding: 12px 14px; }
  input:focus, textarea:focus { outline: 2px solid var(--accent); }
  button { background: var(--accent); color: #081020; border: none; font-weight: 600; cursor: pointer; padding: 12px 18px; }
  button:hover { filter: brightness(1.1); }
  button:disabled { opacity: 0.5; cursor: wait; }
  .label { color: var(--muted); font-size: 13px; margin-bottom: -4px; }
  .meta { color: var(--muted); font-size: 13px; margin: 16px 0 10px; }
  .card { background: var(--card); border: 1px solid #2a3450; border-radius: 12px; padding: 16px 18px; margin-bottom: 10px; }
  .rank { display: inline-block; background: #2a3450; color: var(--accent); font-weight: 700; padding: 2px 10px; border-radius: 999px; margin-right: 8px; }
  .title { font-weight: 600; }
  .snippet { color: var(--muted); margin-top: 6px; font-size: 14px; }
  .row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; font-size: 12px; }
  .chip { background: #202840; color: var(--muted); border-radius: 999px; padding: 3px 10px; }
  .chip.sponsored { background: #3a2a1a; color: var(--warn); }
  .chip.good { background: #1a3a22; color: var(--good); }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .error { color: var(--warn); }
</style>
</head>
<body>
<main>
  <h1>Angel Filter</h1>
  <p class="sub">A proxy that asks several providers, ranks their answers against what <em>you</em> care about, and penalizes sponsored results.</p>

  <form id="f">
    <span class="label">What are you looking for?</span>
    <input id="q" placeholder='e.g. "cheapest 30-pack of toilet paper"' required />
    <span class="label">What matters most to you? (optional)</span>
    <input id="p" placeholder='e.g. "low price, not premium brand"' />
    <button id="go" type="submit">Ask the Angel</button>
  </form>

  <div id="out"></div>
</main>

<script>
const form = document.getElementById("f");
const out = document.getElementById("out");
const btn = document.getElementById("go");

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  const query = document.getElementById("q").value.trim();
  const preference = document.getElementById("p").value.trim() || null;
  if (!query) return;

  btn.disabled = true;
  out.innerHTML = `<div class="meta">Querying providers…</div>`;

  try {
    const res = await fetch("/query", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ query, preference }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    render(data);
  } catch (err) {
    out.innerHTML = `<div class="card error">Request failed: ${err.message}</div>`;
  } finally {
    btn.disabled = false;
  }
});

function render(data) {
  const used = (data.providers_used || []).join(", ") || "none";
  const failed = (data.providers_failed || []).join(", ");
  let html = `<div class="meta">Providers used: ${used}${failed ? " · failed: " + failed : ""}</div>`;
  if (!data.results || data.results.length === 0) {
    html += `<div class="card">No results returned.</div>`;
  } else {
    data.results.forEach((r, i) => {
      const chips = [
        `<span class="chip">score ${r.score}</span>`,
        `<span class="chip">${r.provider}</span>`,
        r.sponsored
          ? `<span class="chip sponsored">sponsored · penalized</span>`
          : `<span class="chip good">organic</span>`,
      ].join("");
      html += `
        <div class="card">
          <span class="rank">#${i + 1}</span><span class="title">${escape(r.title)}</span>
          <div class="snippet">${escape(r.snippet || "")}</div>
          ${r.url ? `<div class="snippet"><a href="${escape(r.url)}" target="_blank" rel="noopener">${escape(r.url)}</a></div>` : ""}
          <div class="row">${chips}</div>
          <div class="snippet"><em>${escape(r.rationale || "")}</em></div>
        </div>`;
    });
  }
  out.innerHTML = html;
}

function escape(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
</script>
</body>
</html>
